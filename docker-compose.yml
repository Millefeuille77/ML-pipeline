services:
  postgres:
    image: postgres:16-alpine
    container_name: fmcg_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-fmcg_intelligence}
      POSTGRES_USER: ${DB_USER:-fmcg_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_in_real_env}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-fmcg_user} -d ${DB_NAME:-fmcg_intelligence}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fmcg_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: postgres
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./data/raw:/app/data/raw:ro
      - ./data/processed:/app/data/processed
      - ./data/models:/app/data/models
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
    driver: local
